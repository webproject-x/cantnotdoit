<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="ico.ico" sizes="any">
  <title>Can't not do it</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
<svg id="roadSvg" aria-hidden="true" preserveAspectRatio="none">
  <defs>
    <filter id="cpShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="rgba(0,0,0,0.22)"/>
    </filter>

    <filter id="roadShadowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="10" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>
</svg>

  <div class="phone-container" id="phoneContainer">
    <div class="title">
      <h1>Can't not do it</h1>
      <p>Доведи каждую задачу до конца</p>
    </div>

    
<div class="top-controls">
  <div class="theme-toggle" id="themeToggleWrap">
    <button
      class="theme-toggle__btn"
      id="themeToggleBtn"
      type="button"
      aria-label="Toggle theme"
      aria-pressed="false"
    >
      <span class="theme-toggle__icon" aria-hidden="true">
  <svg viewBox="0 0 24 24" class="theme-toggle__svg">
    <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M12 3.5
             A8.5 8.5 0 0 0 12 20.5
             Z" fill="currentColor"/>
  </svg>
</span>
    </button>
  </div>

  <div class="lang-dd" id="langDD">
    <button class="lang-dd__btn" id="langBtn"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false">
      <span class="lang-dd__txt" id="langTxt">English</span>
      <svg class="lang-dd__caret" viewBox="0 0 14 8" aria-hidden="true">
        <path d="M1 1l6 6 6-6" fill="none"
              stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="lang-dd__menu" id="langMenu" role="listbox" tabindex="-1">
      <button class="lang-dd__item" role="option" data-lang="en" aria-selected="true" type="button">English</button>
      <button class="lang-dd__item" role="option" data-lang="ru" aria-selected="false" type="button">Русский</button>
    </div>
  </div>
</div>

    <div class="phone" id="phone">

      <div class="btn left mute"></div>
      <div class="btn left vol-up"></div>
      <div class="btn left vol-down"></div>
      <div class="btn right power"></div>

      <div class="screen">
        <div class="notch" aria-hidden="true">
        </div>

<div class="screen-hero">

  <span class="screen-logo-wrap">
  <img class="screen-logo" src="logo.png" alt="Logo">
</span>

  <div class="screen-caption">Can’t not do it</div>

<button class="screen-cta" id="screenCta" type="button" aria-label="Download">
  <span class="cta-label cta-label--idle">Скачать</span>

  <span class="cta-loader" aria-hidden="true">
    <span class="cta-loader-ring"></span>
    <span class="cta-loader-text">Загрузка</span>
  </span>

  <span class="cta-label cta-label--done" aria-hidden="true">
    <span class="cta-check" aria-hidden="true">
      <svg class="cta-checkSvg" viewBox="0 0 24 24" aria-hidden="true">
        <circle class="cta-ring" cx="12" cy="12" r="9" pathLength="1"></circle>
        <path class="cta-tick" d="M7.2 12.4 L10.3 15.4 L16.8 8.8" pathLength="1"></path>
      </svg>
    </span>
    Установлено
  </span>
</button>

  <div class="screen-hint">Доступно для iOS (MacOS) и Android</div>
</div>

        <div class="home" aria-hidden="true"></div>
      </div>
    </div>
  </div>

  <div class="content"></div>

<section class="flyouts">
  <div class="flyout-box left">
    <div class="flyout left"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="Записывай мысли как заметки — приложение само превращает их в понятные задачи. Больше не нужно держать всё в голове: идеи сразу становятся действиями, которые можно выполнить."></div>
    </div>
  </div>

  <div class="flyout-box right">
    <div class="flyout right"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="Приоритеты расставляются так, чтобы ты всегда видел “что реально важно сейчас”. Это помогает избегать ловушки срочности и не тратить день на мелкие дела вместо ключевых."></div>
      </div>
  </div>

  <div class="flyout-box left">
    <div class="flyout left"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="План на день собирается вокруг твоих задач, а не наоборот. Когда у тебя есть ясный план (по сути — тайм-блоки), меньше переключений, меньше хаоса и проще держать фокус."></div>
      </div>
    </div>

  <div class="flyout-box right">
    <div class="flyout right"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="Напоминания приходят вовремя, чтобы ты не “забыл и не отложил”. Это особенно важно для задач на будущее: исследования по prospective memory показывают, что напоминания реально помогают вспоминать и выполнять намерения."></div>
    </div>
  </div>

  <div class="flyout-box left">
    <div class="flyout left"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="Каждая задача ведёт к результату: видишь прогресс и закрываешь этапы по пути. Меньше “начал и бросил”, больше ощущения движения вперёд — ровно то, что в твоём слогане “доведи до конца”."></div>
    </div>
  </div>

  <div class="flyout-box right">
    <div class="flyout right"></div>
    <div class="flyout-text-stack">
      <div class="flyout-text-ghost" aria-hidden="true"></div>
      <div class="flyout-text" data-text="Система простая: “записал → уточнил → организовал → сделал”. Это очень близко к логике GTD, где главное — выгрузить всё из головы и перевести в следующий конкретный шаг."></div>
      </div>
  </div>
</section>

  <script src="main.js" defer></script>

<dialog class="img-modal" id="imgModal" aria-label="Image preview">
  <button class="img-modal__close" id="imgModalClose" type="button" aria-label="Close">
  <svg class="img-modal__closeSvg" viewBox="0 0 24 24" aria-hidden="true">
    <path
      d="M7 7 L17 17 M17 7 L7 17"
      fill="none"
      stroke="currentColor"
      stroke-width="2.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </svg>
</button>
  <div class="img-modal__body" id="imgModalBody"></div>
</dialog>
